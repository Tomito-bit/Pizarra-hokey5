<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Pizarra Hockey</title><style>
body{margin:0;background:#1b5e20;color:#fff;font-family:Arial;text-align:center}h2{margin:10px}#cancha{position:relative;width:95vw;height:85vh;margin:auto;background:#2e7d32;border:4px solid #fff;overflow:hidden}#cancha:before{content:"";position:absolute;top:50%;left:0;width:100%;height:3px;background:#fff}.j{position:absolute;width:46px;height:46px;border-radius:50%;background:#1976d2;color:#fff;font-weight:bold;display:flex;align-items:center;justify-content:center;touch-action:none;user-select:none}
</style></head><body><h2>Pizarra de Hockey sobre Césped</h2><div id="cancha"></div><script>
const c=document.getElementById('cancha');
const pos=[[45,90],[20,70],[40,70],[60,70],[80,70],[20,45],[40,45],[60,45],[80,45],[35,20],[65,20]];
pos.forEach((p,i)=>{let d=document.createElement('div');d.className='j';d.textContent=i+1;d.style.left=p[0]+'%';d.style.top=p[1]+'%';c.appendChild(d);let m=false;d.onpointerdown=e=>{m=true;d.setPointerCapture(e.pointerId)};d.onpointermove=e=>{if(!m)return;let r=c.getBoundingClientRect();d.style.left=(e.clientX-r.left-23)+'px';d.style.top=(e.clientY-r.top-23)+'px'};d.onpointerup=()=>m=false;});
</script></body></html>
